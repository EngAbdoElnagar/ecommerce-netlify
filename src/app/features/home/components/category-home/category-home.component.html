<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
  <app-section-title title="home.categories.title" highlight="home.categories.highlight">
  </app-section-title>

  <a
    routerLink="/categories"
    class="text-primary self-end sm:self-auto hover:text-primary-hover font-medium flex items-center cursor-pointer transition-colors"
  >
    {{ 'home.categories.viewAll' | translate }}

    <i class="fa-solid fa-arrow-right ms-2 rtl:rotate-180 transition-transform"></i>
  </a>
</div>

<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
  @for (item of categoryList(); track item._id) {
    <a [routerLink]="['/subCategories', item._id]" class="cursor-pointer">
      <div
        class="flex flex-col items-center rounded-lg p-4 text-center shadow-sm hover:shadow-md transition group"
      >
        <img
          [src]="item.image"
          alt=""
          class="size-20 overflow-hidden bg-primary-100 rounded-full mb-3 group-hover:bg-primary-200 transition"
        />
        <h3 class="font-medium">{{ item.name }}</h3>
      </div>
    </a>
  }
</div>
