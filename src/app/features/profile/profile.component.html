<div class="min-h-screen bg-gray-50/50">
  <app-main-header
    title="profile.title"
    description="profile.description"
    iconClass="fa-user"
    [breadcrumb]="[{ label: 'profile.breadcrumb' }]"
    bgColorClass="bg-gradient-to-br from-amber-600 to-amber-400"
  ></app-main-header>

  <div class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
      <aside class="w-full lg:w-72 shrink-0">
        <nav class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div class="p-4 border-b border-gray-100">
            <h2 class="font-bold text-gray-900 text-start">
              {{ 'profile.sidebar.header' | translate }}
            </h2>
          </div>

          <ul class="p-2">
            <li>
              <a
                routerLink="/profile/addresses"
                routerLinkActive="bg-primary-50 text-primary-700 !shadow-sm"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group text-gray-600 hover:bg-gray-50 hover:text-gray-900"
              >
                <div
                  class="w-9 h-9 rounded-md flex items-center justify-center transition-colors bg-gray-100 text-gray-500 group-hover:bg-gray-200"
                  [class.!bg-primary-500]="rlaAddresses.isActive"
                  [class.!text-white]="rlaAddresses.isActive"
                >
                  <i class="fa-solid fa-location-dot text-sm"></i>
                </div>

                <span
                  class="font-medium flex-1 text-start"
                  #rlaAddresses="routerLinkActive"
                  routerLinkActive
                >
                  {{ 'profile.sidebar.addresses' | translate }}
                </span>

                <i
                  class="fa-solid fa-chevron-right text-xs transition-transform rtl:rotate-180"
                  [class.text-primary-500]="rlaAddresses.isActive"
                  [class.text-gray-400]="!rlaAddresses.isActive"
                  [class.!rotate-90]="rlaAddresses.isActive"
                ></i>
              </a>
            </li>

            <li>
              <a
                routerLink="/profile/settings"
                routerLinkActive="bg-primary-50 text-primary-700 !shadow-sm"
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group text-gray-600 hover:bg-gray-50 hover:text-gray-900"
              >
                <div
                  class="w-9 h-9 rounded-md flex items-center justify-center transition-colors bg-gray-100 text-gray-500 group-hover:bg-gray-200"
                  [class.!bg-primary-500]="rlaSettings.isActive"
                  [class.!text-white]="rlaSettings.isActive"
                >
                  <i class="fa-solid fa-gear text-sm"></i>
                </div>

                <span
                  class="font-medium flex-1 text-start"
                  #rlaSettings="routerLinkActive"
                  routerLinkActive
                >
                  {{ 'profile.sidebar.settings' | translate }}
                </span>

                <i
                  class="fa-solid fa-chevron-right text-xs transition-transform rtl:rotate-180"
                  [class.text-primary-500]="rlaSettings.isActive"
                  [class.text-gray-400]="!rlaSettings.isActive"
                  [class.!rotate-90]="rlaSettings.isActive"
                ></i>
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="flex-1 min-w-0">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
