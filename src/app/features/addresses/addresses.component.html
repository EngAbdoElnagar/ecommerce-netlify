<div>
  <div class="flex items-center justify-between mb-6">
    <div class="text-start">
      <h2 class="text-xl font-bold text-gray-900">
        {{ 'addresses.title' | translate }}
      </h2>
      <p class="text-gray-500 text-sm mt-1">
        {{ 'addresses.subtitle' | translate }}
      </p>
    </div>

    <button
      type="button"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-primary-600 text-white font-semibold hover:bg-primary-700 transition-colors shadow-lg shadow-primary-600/25"
    >
      <i class="fa-solid fa-plus text-sm"></i>
      <span>{{ 'addresses.addBtn' | translate }}</span>
    </button>
  </div>

  <div class="bg-white rounded-3xl border border-gray-100 p-12 text-center">
    <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5">
      <i class="fa-solid fa-location-dot text-3xl text-gray-400"></i>
    </div>

    <h3 class="text-lg font-bold text-gray-900 mb-2">
      {{ 'addresses.empty.title' | translate }}
    </h3>

    <p class="text-gray-500 mb-6 max-w-sm mx-auto">
      {{ 'addresses.empty.description' | translate }}
    </p>

    <button
      type="button"
      class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-primary-600 text-white font-semibold hover:bg-primary-700 transition-colors shadow-lg shadow-primary-600/25"
    >
      <i class="fa-solid fa-plus"></i>
      <span>{{ 'addresses.empty.firstBtn' | translate }}</span>
    </button>
  </div>
</div>
